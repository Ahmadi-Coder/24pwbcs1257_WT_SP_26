<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Button Styling Collection</title>
    <link rel="stylesheet" href="button_collection.css">
</head>
<body>

    <h1>Button Styling Collection</h1>

    <!-- Size Variations -->
    <section class="button-section">
        <h2>Size Variations</h2>
        <div class="button-group">
            <button class="btn btn-small btn-primary">Small Button</button>
            <button class="btn btn-medium btn-primary">Medium Button</button>
            <button class="btn btn-large btn-primary">Large Button</button>
            <button class="btn btn-xlarge btn-primary">Extra Large</button>
        </div>
    </section>

    <!-- Color Variations -->
    <section class="button-section">
        <h2>Color Variations</h2>
        <div class="button-group">
            <button class="btn btn-primary">Primary</button>
            <button class="btn btn-secondary">Secondary</button>
            <button class="btn btn-success">Success</button>
            <button class="btn btn-danger">Danger</button>
            <button class="btn btn-warning">Warning</button>
            <button class="btn btn-info">Info</button>
            <button class="btn btn-dark">Dark</button>
            <button class="btn btn-light">Light</button>
        </div>
    </section>

    <!-- Shape Variations -->
    <section class="button-section">
        <h2>Shape Variations</h2>
        <div class="button-group">
            <button class="btn btn-primary btn-square">Square</button>
            <button class="btn btn-primary btn-rounded">Rounded</button>
            <button class="btn btn-primary btn-pill">Pill</button>
            <button class="btn btn-primary btn-circle">+</button>
        </div>
    </section>

    <!-- Gradient Buttons -->
    <section class="button-section">
        <h2>Gradient Backgrounds</h2>
        <div class="button-group">
            <button class="btn btn-gradient-1">Sunset</button>
            <button class="btn btn-gradient-2">Ocean</button>
            <button class="btn btn-gradient-3">Forest</button>
            <button class="btn btn-gradient-4">Berry</button>
            <button class="btn btn-gradient-5">Fire</button>
            <button class="btn btn-gradient-6">Aurora</button>
        </div>
    </section>

    <!-- Shadow Effects -->
    <section class="button-section">
        <h2>Shadow Effects</h2>
        <div class="button-group">
            <button class="btn btn-primary btn-shadow-sm">Small Shadow</button>
            <button class="btn btn-primary btn-shadow-md">Medium Shadow</button>
            <button class="btn btn-primary btn-shadow-lg">Large Shadow</button>
            <button class="btn btn-primary btn-shadow-glow">Glow Effect</button>
            <button class="btn btn-primary btn-shadow-3d">3D Effect</button>
        </div>
    </section>

    <!-- Hover Effects -->
    <section class="button-section">
        <h2>Hover Effects</h2>
        <div class="button-group">
            <button class="btn btn-primary btn-hover-lift">Lift Up</button>
            <button class="btn btn-primary btn-hover-scale">Scale</button>
            <button class="btn btn-primary btn-hover-rotate">Rotate</button>
            <button class="btn btn-primary btn-hover-slide">Slide</button>
            <button class="btn btn-primary btn-hover-shine">Shine</button>
            <button class="btn btn-primary btn-hover-pulse">Pulse</button>
        </div>
    </section>

    <!-- Outline Buttons -->
    <section class="button-section">
        <h2>Outline Styles</h2>
        <div class="button-group">
            <button class="btn btn-outline-primary">Primary Outline</button>
            <button class="btn btn-outline-secondary">Secondary Outline</button>
            <button class="btn btn-outline-success">Success Outline</button>
            <button class="btn btn-outline-danger">Danger Outline</button>
            <button class="btn btn-outline-warning">Warning Outline</button>
        </div>
    </section>

    <!-- Icon Buttons -->
    <section class="button-section">
        <h2>Icon Buttons</h2>
        <div class="button-group">
            <button class="btn btn-primary btn-icon">
                <span class="icon">&#8592;</span> Back
            </button>
            <button class="btn btn-success btn-icon">
                Save <span class="icon">&#10003;</span>
            </button>
            <button class="btn btn-danger btn-icon">
                <span class="icon">&#10007;</span> Delete
            </button>
            <button class="btn btn-info btn-icon">
                <span class="icon">&#9432;</span> Info
            </button>
        </div>
    </section>

    <!-- Disabled States -->
    <section class="button-section">
        <h2>Disabled States</h2>
        <div class="button-group">
            <button class="btn btn-primary" disabled>Disabled Primary</button>
            <button class="btn btn-success" disabled>Disabled Success</button>
            <button class="btn btn-outline-primary" disabled>Disabled Outline</button>
            <button class="btn btn-gradient-1" disabled>Disabled Gradient</button>
        </div>
    </section>

    <!-- Special Effects -->
    <section class="button-section">
        <h2>Special Effects</h2>
        <div class="button-group">
            <button class="btn btn-glass">Glassmorphism</button>
            <button class="btn btn-neon">Neon Glow</button>
            <button class="btn btn-retro">Retro Style</button>
            <button class="btn btn-ripple">Ripple Effect</button>
        </div>
    </section>

    <!-- Button Groups -->
    <section class="button-section">
        <h2>Button Groups</h2>
        <div class="btn-group">
            <button class="btn btn-primary">Left</button>
            <button class="btn btn-primary">Middle</button>
            <button class="btn btn-primary">Right</button>
        </div>
        <div class="btn-group">
            <button class="btn btn-outline-primary">First</button>
            <button class="btn btn-outline-primary">Second</button>
            <button class="btn btn-outline-primary">Third</button>
            <button class="btn btn-outline-primary">Fourth</button>
        </div>
    </section>

</body>
</html>
